<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TabICL AI Engine - Lean NAFLD CDSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-50">
<div id="app" class="max-w-4xl mx-auto py-10 px-4">
    <header class="text-center mb-10">
        <h1 class="text-4xl font-black text-teal-900">TabICL AI Engine</h1>
        <p class="text-xl text-teal-700 font-semibold mt-2">瘦型非酒精性脂肪肝预测系统</p>
        <button @click="toggleLang" class="mt-3 text-sm text-gray-500 hover:text-teal-600 underline">
            {{ lang === 'zh' ? 'Switch to English' : '切换至中文' }}
        </button>
    </header>
    
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-teal-50">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{{ t('alt') }}</label>
                <input v-model="form.ALT" placeholder="e.g., 25" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{{ t('tg') }}</label>
                <input v-model="form.TG" placeholder="e.g., 1.2" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-teal-500 outline-none">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    {{ t('bmi') }} 
                    <span class="text-red-500 font-black ml-2 animate-pulse">(Strictly < 25 kg/m²)</span>
                </label>
                <input v-model="form.BMI" placeholder="e.g., 22.5" class="w-full border-2 border-red-200 p-3 rounded-lg focus:border-red-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{{ t('ua') }}</label>
                <input v-model="form.UA" placeholder="e.g., 300" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{{ t('glu') }}</label>
                <input v-model="form.Glucose" placeholder="e.g., 5.1" class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-teal-500 outline-none">
            </div>
        </div>

        <button @click="predict" class="w-full mt-8 bg-teal-800 text-white py-4 rounded-xl font-black text-lg hover:bg-teal-950 transition-all">
            {{ loading ? 'Analyzing / 深度解析中...' : t('btnPredict') }}
        </button>
        
        <div v-if="result" class="mt-8 p-6 bg-teal-50 rounded-xl border-2 border-teal-200 text-center">
            <p class="text-sm text-teal-800 font-bold uppercase">{{ t('probLabel') }}</p>
            <div class="text-6xl font-black text-teal-950 my-2">{{ result.prediction.risk_probability }}%</div>
        </div>
    </div>
</div>

<script>
    const translations = {
        en: { alt: 'ALT (U/L)', tg: 'TG (mmol/L)', bmi: 'BMI (kg/m²)', ua: 'UA (μmol/L)', glu: 'FPG (mmol/L)', btnPredict: 'Execute Model Inference', probLabel: 'Probability of Lean NAFLD' },
        zh: { alt: '谷丙转氨酶 ALT (U/L)', tg: '甘油三酯 TG (mmol/L)', bmi: '体质指数 BMI (kg/m²)', ua: '血清尿酸 UA (μmol/L)', glu: '空腹血糖 FPG (mmol/L)', btnPredict: '执行大模型推理', probLabel: '瘦型脂肪肝预测发生概率' }
    }
    Vue.createApp({
        data() { return { lang: 'en', loading: false, result: null, form: { ALT: '', TG: '', BMI: '', UA: '', Glucose: '' } } },
        methods: {
            t(key) { return translations[this.lang][key]; },
            toggleLang() { this.lang = this.lang === 'zh' ? 'en' : 'zh'; },
            async predict() {
                this.loading = true;
                try {
                    const response = await fetch('/predict_nafld', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ALT: parseFloat(this.form.ALT), TG: parseFloat(this.form.TG), BMI: parseFloat(this.form.BMI), UA: parseFloat(this.form.UA), Glucose: parseFloat(this.form.Glucose) })
                    });
                    this.result = await response.json();
                } catch (e) { alert("Error connecting to AI backend"); }
                this.loading = false;
            }
        }
    }).mount('#app')
</script>
</body>
</html>
