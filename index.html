<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TabICL - Lean NAFLD CDSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100">
<div id="app" class="max-w-4xl mx-auto py-10 px-4">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-bold text-teal-900">TabICL AI Engine</h1>
        <button @click="toggleLang" class="mt-2 text-sm text-teal-700 underline">{{ lang === 'zh' ? 'Switch to English' : '切换至中文' }}</button>
    </header>
    
    <div class="bg-white p-8 rounded-xl shadow-lg">
        <div class="grid grid-cols-2 gap-4">
            <input v-model="form.ALT" placeholder="ALT" class="border p-3 rounded">
            <input v-model="form.TG" placeholder="TG" class="border p-3 rounded">
            <input v-model="form.BMI" placeholder="BMI" class="border p-3 rounded">
            <input v-model="form.UA" placeholder="UA" class="border p-3 rounded">
            <input v-model="form.Glucose" placeholder="Glucose" class="border p-3 rounded">
        </div>
        <button @click="predict" class="w-full mt-6 bg-teal-600 text-white py-3 rounded font-bold hover:bg-teal-700">
            {{ loading ? 'Analyzing...' : 'Predict' }}
        </button>
        <div v-if="result" class="mt-6 text-center text-2xl font-bold">
            Risk: {{ result.prediction.risk_probability }}%
        </div>
    </div>
</div>

<script>
    Vue.createApp({
        data() { return { lang: 'en', loading: false, result: null, form: { ALT: '', TG: '', BMI: '', UA: '', Glucose: '' } } },
        methods: {
            toggleLang() { this.lang = this.lang === 'zh' ? 'en' : 'zh'; },
            async predict() {
                this.loading = true;
                try {
                    const response = await fetch('/predict_nafld', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            ALT: parseFloat(this.form.ALT), TG: parseFloat(this.form.TG), 
                            BMI: parseFloat(this.form.BMI), UA: parseFloat(this.form.UA), 
                            Glucose: parseFloat(this.form.Glucose) 
                        })
                    });
                    this.result = await response.json();
                } catch (e) { alert("Error"); }
                this.loading = false;
            }
        }
    }).mount('#app')
</script>
</body>
</html>
